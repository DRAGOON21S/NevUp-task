services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: nevup
      POSTGRES_PASSWORD: nevup
      POSTGRES_DB: nevup
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nevup -d nevup"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  db-migrate:
    build: .
    command: ["npm", "run", "migrate"]
    environment:
      DATABASE_URL: postgres://nevup:nevup@postgres:5432/nevup
    depends_on:
      postgres:
        condition: service_healthy
    profiles: ["tools"]

  db-seed:
    build: .
    command: ["npm", "run", "seed"]
    environment:
      DATABASE_URL: postgres://nevup:nevup@postgres:5432/nevup
      SEED_CSV_PATH: /app/data/nevup_seed_dataset.csv
    depends_on:
      postgres:
        condition: service_healthy
      db-migrate:
        condition: service_completed_successfully
    profiles: ["tools"]

  api:
    build: .
    command: ["npm", "run", "start"]
    environment:
      DATABASE_URL: postgres://nevup:nevup@postgres:5432/nevup
      REDIS_URL: redis://redis:6379
      PORT: 4010
      JWT_SECRET: 97791d4db2aa5f689c3cc39356ce35762f0a73aa70923039d8ef72a2840a1b02
    ports:
      - "4010:4010"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    profiles: ["app"]

  analytics-worker:
    build: .
    command: ["npm", "run", "worker"]
    environment:
      DATABASE_URL: postgres://nevup:nevup@postgres:5432/nevup
      REDIS_URL: redis://redis:6379
      WORKER_BATCH_SIZE: 50
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    profiles: ["app"]

volumes:
  postgres-data:
  redis-data:
