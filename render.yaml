services:
  - type: web
    name: nevup-api
    runtime: node
    plan: starter
    buildCommand: npm ci && npm run build
    startCommand: npm run migrate && npm run seed && npm run start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4010
      - key: POOL_MAX
        value: 50
      - key: REQUEST_LOG_SAMPLE_RATE
        value: 0.01
      - key: SEED_CSV_PATH
        value: data/nevup_seed_dataset.csv
      - key: JWT_SECRET
        value: 97791d4db2aa5f689c3cc39356ce35762f0a73aa70923039d8ef72a2840a1b02
      - key: DATABASE_URL
        fromDatabase:
          name: nevup-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: nevup-redis
          property: connectionString

  - type: worker
    name: nevup-analytics-worker
    runtime: node
    plan: starter
    buildCommand: npm ci && npm run build
    startCommand: npm run worker
    envVars:
      - key: NODE_ENV
        value: production
      - key: POOL_MAX
        value: 20
      - key: WORKER_BATCH_SIZE
        value: 50
      - key: JWT_SECRET
        value: 97791d4db2aa5f689c3cc39356ce35762f0a73aa70923039d8ef72a2840a1b02
      - key: DATABASE_URL
        fromDatabase:
          name: nevup-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: nevup-redis
          property: connectionString

  - type: keyvalue
    name: nevup-redis
    plan: starter
    maxmemoryPolicy: noeviction
    ipAllowList: []

databases:
  - name: nevup-postgres
    databaseName: nevup
    user: nevup
    plan: starter
